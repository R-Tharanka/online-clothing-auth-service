name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: online-clothing-auth-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: online-clothing-auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Snyk SAST
        if: ${{ secrets.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk test --severity-threshold=critical

      - name: Docker login
        if: ${{ github.event_name == 'push' && secrets.REGISTRY_USER != '' && secrets.REGISTRY_PASS != '' && secrets.REGISTRY_URL != '' }}
        run: echo ${{ secrets.REGISTRY_PASS }} | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build Docker image
        if: ${{ github.event_name == 'push' && secrets.REGISTRY_URL != '' }}
        run: docker build -t ${{ secrets.REGISTRY_URL }}/auth-service:${{ github.sha }} .

      - name: Push Docker image
        if: ${{ github.event_name == 'push' && secrets.REGISTRY_USER != '' && secrets.REGISTRY_PASS != '' && secrets.REGISTRY_URL != '' }}
        run: docker push ${{ secrets.REGISTRY_URL }}/auth-service:${{ github.sha }}

      - name: Deploy (placeholder)
        if: ${{ false }}
        run: echo "Add cloud CLI deploy step here"
