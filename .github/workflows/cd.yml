name: CD

on:
  push:
    branches: ["main", "master"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/online-clothing-auth-service:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/online-clothing-auth-service:latest

      - name: Trigger Railway deploy
        env:
          RAILWAY_DEPLOY_WEBHOOK_URL: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_WEBHOOK_URL" ]; then
            echo "RAILWAY_DEPLOY_WEBHOOK_URL is not set"
            exit 1
          fi
          curl -X POST "$RAILWAY_DEPLOY_WEBHOOK_URL"
