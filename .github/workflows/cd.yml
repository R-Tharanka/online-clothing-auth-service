name: CD

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:          # allow manual runs from Actions UI

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write            # needed to push to ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/online-clothing-auth-service

      - name: Build and push Docker image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Railway deployment (via webhook)
        if: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK_URL != '' }}
        env:
          RAILWAY_DEPLOY_WEBHOOK_URL: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK_URL }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/online-clothing-auth-service:${{ github.sha }}
          IMAGE_LATEST: ghcr.io/${{ github.repository_owner }}/online-clothing-auth-service:latest
        run: |
          echo "Calling Railway deploy webhook..."
          # Send JSON payload with the image name (Railway will accept a simple POST; this payload is harmless even if not used)
          payload="{\"image\":\"$IMAGE\",\"image_latest\":\"$IMAGE_LATEST\",\"ref\":\"${GITHUB_REF}\",\"commit\":\"${GITHUB_SHA}\"}"
          # Use -sSf to show errors; fail job if webhook returns non-2xx
          curl -sSf -X POST "$RAILWAY_DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
          echo "Webhook posted successfully."

      - name: Skip Railroad deploy (webhook not configured)
        if: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK_URL == '' }}
        run: |
          echo "::warning ::RAILWAY_DEPLOY_WEBHOOK_URL secret is not set. Skipping remote deploy."
          echo "If Railway is set to auto-deploy from the GitHub repo you may not need a webhook."